<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Spirit Island Helper - Tool 2</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.7);
      --border:rgba(255,255,255,.22);
      --btn:rgba(255,255,255,.10);
      --btnHover:rgba(255,255,255,.16);
      --danger:rgba(255,80,80,.25);
    }
    html, body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      overscroll-behavior:none;
      -webkit-text-size-adjust:100%;
      font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      touch-action: manipulation;
      user-select:none;
    }
    #app{
      height:100vh;
      width:100vw;
      display:flex;
      flex-direction:column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing:border-box;
      position: relative;
    }

    #rotateOverlay{
      position:fixed;
      inset:0;
      background:#000;
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      z-index:50;
      box-sizing:border-box;
    }
    #rotateOverlay h1{ margin:0 0 8px 0; font-size:28px; letter-spacing:.5px; }
    #rotateOverlay p{ margin:0; color:var(--muted); font-size:18px; line-height:1.35; }
    @media (orientation: portrait){
      #rotateOverlay{ display:flex; }
    }

    .center{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
      padding:18px;
      box-sizing:border-box;
    }
    .controlsRow{
      display:flex;
      gap:14px;
      width:min(900px, 92vw);
      justify-content:center;
      align-items:center;
      flex-wrap:nowrap;
    }
    button{
      appearance:none;
      border:1px solid var(--border);
      background:var(--btn);
      color:var(--fg);
      padding:14px 18px;
      border-radius:14px;
      font-size:18px;
      letter-spacing:.3px;
      cursor:pointer;
      min-width:170px;
    }
    button:hover{ background:var(--btnHover); }
    button:active{ transform:translateY(1px); }
    button.small{
      min-width:auto;
      padding:10px 14px;
      font-size:16px;
      border-radius:12px;
    }
    button.danger{
      background:var(--danger);
      border-color: rgba(255,80,80,.45);
    }

    #resetFloating{
      position:absolute;
      top:14px;
      right:14px;
      z-index:10;
    }

    #modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.6);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      box-sizing:border-box;
      z-index:40;
    }
    #modalBackdrop.show{ display:flex; }
    #modal{
      width:min(520px, 92vw);
      border:1px solid var(--border);
      border-radius:16px;
      background:#000;
      padding:18px;
      box-sizing:border-box;
    }
    #modal h2{ margin:0 0 10px 0; font-size:22px; letter-spacing:.2px; }
    #modal p{ margin:0 0 16px 0; color:var(--muted); font-size:16px; line-height:1.35; }
    #modal .modalRow{ display:flex; justify-content:flex-end; gap:10px; }
  </style>
</head>

<body>
  <div id="rotateOverlay">
    <div>
      <h1>Rotate iPad</h1>
      <p>Please use landscape mode.</p>
    </div>
  </div>

  
  <div id="modalBackdrop" aria-hidden="true">
    <div id="modal" role="dialog" aria-modal="true">
      <h2>Resetear al inicio?</h2>
      <div class="modalRow">
        <button id="btnCancelReset" class="small">CANCELAR</button>
        <button id="btnConfirmReset" class="small danger">RESETEAR</button>
      </div>
    </div>
  </div>


  <div id="app">
    <div id="resetFloating">
      <button id="btnReset" class="small danger">RESET</button>
    </div>

    <div class="center">
      <div class="controlsRow">
        <button id="btnBack">BACK</button>
      </div>
    </div>
  </div>

  <script>
    // BACK: vuelve a la pantalla de randomizer dentro del index (y ahora sí mantiene estado por localStorage)
    document.getElementById("btnBack").addEventListener("click", () => {
      window.location.href = "./index.html#randomizer";
    });

    // RESET: 2 clicks y vuelve al inicio del index (el index borra el estado cuando confirmás reset)
    const modalBackdrop = document.getElementById("modalBackdrop");
    const btnCancelReset = document.getElementById("btnCancelReset");
    const btnConfirmReset = document.getElementById("btnConfirmReset");

    function openResetModal(){
      modalBackdrop.classList.add("show");
      modalBackdrop.setAttribute("aria-hidden","false");
    }
    function closeResetModal(){
      modalBackdrop.classList.remove("show");
      modalBackdrop.setAttribute("aria-hidden","true");
    }

    document.getElementById("btnReset").addEventListener("click", openResetModal);
    btnCancelReset.addEventListener("click", closeResetModal);
    btnConfirmReset.addEventListener("click", () => {
      closeResetModal();
      window.location.href = "./index.html";
    });
    modalBackdrop.addEventListener("click", (e) => {
      if(e.target === modalBackdrop) closeResetModal();
    });
  </script>
</body>
</html>
