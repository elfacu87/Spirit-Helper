
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Spirit Island Helper - Tool 2</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.7);
      --border:rgba(255,255,255,.22);
      --btn:rgba(255,255,255,.10);
      --btnHover:rgba(255,255,255,.16);
      --danger:rgba(255,80,80,.25);
    }
    html, body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      overscroll-behavior:none;
      -webkit-text-size-adjust:100%;
      font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      touch-action: manipulation;
      user-select:none;
    }
    #app{
      height:100vh;
      width:100vw;
      display:flex;
      flex-direction:column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing:border-box;
    }

    /* Portrait blocker */
    #rotateOverlay{
      position:fixed;
      inset:0;
      background:#000;
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      z-index:50;
      box-sizing:border-box;
    }
    #rotateOverlay h1{ margin:0 0 8px 0; font-size:28px; letter-spacing:.5px; }
    #rotateOverlay p{ margin:0; color:var(--muted); font-size:18px; line-height:1.35; }
    @media (orientation: portrait){
      #rotateOverlay{ display:flex; }
    }

    .center{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
      padding:18px;
      box-sizing:border-box;
    }

    h1{
      margin:0;
      font-size:34px;
      letter-spacing:.6px;
      text-align:center;
    }

    .card{
      width:min(900px, 92vw);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      box-sizing:border-box;
      text-align:center;
      font-size:22px;
      line-height:1.35;
    }

    .controlsRow{
      display:flex;
      gap:14px;
      width:min(900px, 92vw);
      justify-content:center;
      align-items:center;
      flex-wrap:nowrap;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:var(--btn);
      color:var(--fg);
      padding:14px 18px;
      border-radius:14px;
      font-size:18px;
      letter-spacing:.3px;
      cursor:pointer;
      min-width:170px;
    }
    button:hover{ background:var(--btnHover); }
    button:active{ transform:translateY(1px); }
  </style>
</head>

<body>
  <div id="rotateOverlay">
    <div>
      <h1>Rotate iPad</h1>
      <p>Please use landscape mode.</p>
    </div>
  </div>

  <div id="app">
    <div class="center">
      <h1>TOOL 2</h1>

      <div class="card">
        Acá vamos a construir la próxima herramienta.<br>
        Decime cuál querés que sea y la armamos paso a paso.
      </div>

      <div class="controlsRow">
        <button id="btnBackToHome">BACK TO HOME</button>
      </div>
    </div>
  </div>

  <script>
    // Vuelve al index.html (tu app estable)
    document.getElementById("btnBackToHome").addEventListener("click", () => {
      window.location.href = "./index.html";
    });
  </script>
</body>
</html>
