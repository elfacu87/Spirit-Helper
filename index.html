<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Spirit Island Helper</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.7);
      --border:rgba(255,255,255,.22);
      --btn:rgba(255,255,255,.10);
      --btnHover:rgba(255,255,255,.16);
      --danger:rgba(255,80,80,.25);
    }

    html, body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      overscroll-behavior:none;
      -webkit-text-size-adjust:100%;
      font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      touch-action: manipulation;
      user-select:none;
    }

    #app{
      height:100vh;
      width:100vw;
      display:flex;
      flex-direction:column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing:border-box;
      position: relative;
    }

    /* Portrait blocker */
    #rotateOverlay{
      position:fixed;
      inset:0;
      background:#000;
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      z-index:50;
      box-sizing:border-box;
    }
    #rotateOverlay h1{ margin:0 0 8px 0; font-size:28px; letter-spacing:.5px; }
    #rotateOverlay p{ margin:0; color:var(--muted); font-size:18px; line-height:1.35; }
    @media (orientation: portrait){
      #rotateOverlay{ display:flex; }
    }

    .screen{
      flex:1;
      display:none;
      flex-direction:column;
      gap:18px;
      box-sizing:border-box;
    }
    .screen.active{ display:flex; }

    .center{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
      padding:18px;
      box-sizing:border-box;
    }

    h1{
      margin:0;
      font-size:34px;
      letter-spacing:.6px;
      text-align:center;
    }

    .card{
      width:min(900px, 92vw);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      box-sizing:border-box;
    }

    .controlsRow{
      display:flex;
      gap:14px;
      width:min(900px, 92vw);
      justify-content:center;
      align-items:center;
      flex-wrap:nowrap;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:var(--btn);
      color:var(--fg);
      padding:14px 18px;
      border-radius:14px;
      font-size:18px;
      letter-spacing:.3px;
      cursor:pointer;
      min-width:150px;
    }
    button:hover{ background:var(--btnHover); }
    button:active{ transform:translateY(1px); }
    button.small{
      min-width:auto;
      padding:10px 14px;
      font-size:16px;
      border-radius:12px;
    }
    button.danger{
      background:var(--danger);
      border-color: rgba(255,80,80,.45);
    }

    select{
      width:min(420px, 80vw);
      background:#000;
      color:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 16px;
      font-size:20px;
      text-align:center;
      outline:none;
    }

    .results{
      display:flex;
      flex-direction:column;
      gap:12px;
      font-size:22px;
      line-height:1.2;
    }
    .resultLine{
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:14px;
      background:rgba(255,255,255,.06);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Reset floating button */
    #resetFloating{
      position:absolute;
      top:14px;
      right:14px;
      z-index:10;
    }

    /* Modal */
    #modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.6);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      box-sizing:border-box;
      z-index:40;
    }
    #modalBackdrop.show{ display:flex; }
    #modal{
      width:min(520px, 92vw);
      border:1px solid var(--border);
      border-radius:16px;
      background:#000;
      padding:18px;
      box-sizing:border-box;
    }
    #modal h2{ margin:0 0 12px 0; font-size:22px; letter-spacing:.2px; }
    #modal .modalRow{ display:flex; justify-content:flex-end; gap:10px; }

    /* Show only REROLL after first roll */
    #btnReroll { display:none; }
    #btnReroll.show { display:inline-block; }
    #btnRandomize.hide { display:none; }
  </style>
</head>

<body>
  <div id="rotateOverlay">
    <div>
      <h1>Rotate iPad</h1>
      <p>Please use landscape mode.</p>
    </div>
  </div>

  <div id="modalBackdrop" aria-hidden="true">
    <div id="modal" role="dialog" aria-modal="true">
      <h2>Resetear?</h2>
      <div class="modalRow">
        <button id="btnCancelReset" class="small">CANCELAR</button>
        <button id="btnConfirmReset" class="small danger">RESETEAR</button>
      </div>
    </div>
  </div>

  <div id="app">
    <div id="resetFloating" style="display:none;">
      <button id="btnReset" class="small danger">RESET</button>
    </div>

    <!-- SCREEN 1 -->
    <div id="screenPlayers" class="screen active">
      <div class="center">
        <h1>NÚMERO DE JUGADORES</h1>

        <select id="playersSelect" aria-label="Número de jugadores">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>

        <div class="controlsRow">
          <button id="btnContinue">CONTINUAR</button>
        </div>
      </div>
    </div>

    <!-- SCREEN 2 -->
    <div id="screenRandomizer" class="screen">
      <div class="center">
        <h1>RANDOMIZER</h1>

        <div class="card">
          <div class="results" id="results"></div>
        </div>

        <div class="controlsRow">
          <button id="btnBack">BACK</button>
          <button id="btnRandomize">RANDOMIZER</button>
          <button id="btnReroll">REROLL</button>
          <button id="btnContinue2">CONTINUAR</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    /***********************
     * STORAGE
     ***********************/
    const STORAGE_KEY = "si_helper_state_v1";

    function saveStateToStorage(){
      const payload = {
        players: state.players,
        assignments: state.assignments,
        hasRolledOnce: state.hasRolledOnce
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function loadStateFromStorage(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return null;
        const parsed = JSON.parse(raw);
        if(!parsed || typeof parsed !== "object") return null;
        return parsed;
      }catch(e){
        return null;
      }
    }

    function clearStorage(){
      localStorage.removeItem(STORAGE_KEY);
    }

    /***********************
     * DATA
     ***********************/
    const BOARDS = ["Board A","Board B","Board C","Board D","Board E","Board F"];

    const SPIRITS_AND_ASPECTS = [
      "A Spread of Rampant Green - Base",
      "A Spread of Rampant Green - Regrowth",
      "A Spread of Rampant Green - Tangles",
      "Breath of the Darkness Down Your Spine",
      "Bringer of Dreams and Nightmares - Base",
      "Bringer of Dreams and Nightmares - Enticing",
      "Bringer of Dreams and Nightmares - Violence",
      "Dances Up Earthquakes",
      "Devouring Teeth Lurk Underfoot",
      "Downpour Drenches the World",
      "Ember-Eyed Behemoth",
      "Eyes Watch from the Trees",
      "Fathomless Mud of the Swamp",
      "Finder of Paths Unseen",
      "Fractured Days Split the Sky",
      "Grinning Trickster Stirs Up Trouble",
      "Heart of the Wildfire - Base",
      "Heart of the Wildfire - Transforming",
      "Hearth-Vigil",
      "Keeper of the Forbidden Wilds - Base",
      "Keeper of the Forbidden Wilds - Spreading Hostility",
      "Lightning Swift Strike - Base",
      "Lightning Swift Strike - Immense",
      "Lightning Swift Strike - Pandemonium",
      "Lightning Swift Strike - Sparking",
      "Lightning Swift Strike - Wind",
      "Lure of the Deep Wilderness - Base",
      "Lure of the Deep Wilderness - Lair",
      "Many Minds Move as One",
      "Ocean's Hungry Grasp - Base",
      "Ocean's Hungry Grasp - Deeps",
      "Relentless Gaze of the Sun",
      "Rising Heat of Stone and Sand",
      "River Surges in Sunlight - Base",
      "River Surges in Sunlight - Haven",
      "River Surges in Sunlight - Sunshine",
      "River Surges in Sunlight - Travel",
      "Serpent Slumbering Beneath the Island - Base",
      "Serpent Slumbering Beneath the Island - Locus",
      "Shadows Flicker Like Flame - Amorphous",
      "Shadows Flicker Like Flame - Base",
      "Shadows Flicker Like Flame - Dark Fire",
      "Shadows Flicker Like Flame - Foreboding",
      "Shadows Flicker Like Flame - Madness",
      "Shadows Flicker Like Flame - Reach",
      "Sharp Fangs Behind the Leaves - Base",
      "Sharp Fangs Behind the Leaves - Encircle",
      "Sharp Fangs Behind the Leaves - Unconstrained",
      "Shifting Memory of Ages - Base",
      "Shifting Memory of Ages - Intensify",
      "Shifting Memory of Ages - Mentor",
      "Shroud of Silent Mist - Base",
      "Shroud of Silent Mist - Stranded",
      "Starlight Seeks Its Form",
      "Stone's Unyielding Defiance",
      "Sun-Bright Whirlwind",
      "Thunderspeaker - Base",
      "Thunderspeaker - Tactician",
      "Thunderspeaker - Warrior",
      "Towering Roots of the Jungle",
      "Vengeance as a Burning Plague",
      "Vital Strength of the Earth - Base",
      "Vital Strength of the Earth - Might",
      "Vital Strength of the Earth - Nourishing",
      "Vital Strength of the Earth - Resilience",
      "Volcano Looming High",
      "Wandering Voice Keens Delirium",
      "Wounded Waters Bleeding"
    ];

    /***********************
     * CRYPTO RANDOM
     ***********************/
    function cryptoInt(maxExclusive){
      const arr = new Uint32Array(1);
      const limit = Math.floor(0xFFFFFFFF / maxExclusive) * maxExclusive;
      while(true){
        crypto.getRandomValues(arr);
        const x = arr[0];
        if(x < limit) return x % maxExclusive;
      }
    }
    function shuffleCrypto(array){
      const a = array.slice();
      for(let i = a.length - 1; i > 0; i--){
        const j = cryptoInt(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    /***********************
     * GROUP SPIRITS BY BASE (exclude all aspects once selected)
     ***********************/
    function buildSpiritGroups(list){
      const map = new Map();
      for(const item of list){
        const base = item.includes(" - ") ? item.split(" - ")[0] : item;
        if(!map.has(base)) map.set(base, []);
        map.get(base).push(item);
      }
      return map;
    }
    const SPIRIT_GROUPS = buildSpiritGroups(SPIRITS_AND_ASPECTS);
    const SPIRIT_BASES = Array.from(SPIRIT_GROUPS.keys());

    function pickRandomVariant(baseSpirit){
      const variants = SPIRIT_GROUPS.get(baseSpirit) || [];
      return variants.length ? variants[cryptoInt(variants.length)] : baseSpirit;
    }

    /***********************
     * STATE
     ***********************/
    const state = {
      players: 3,
      assignments: [],
      hasRolledOnce: false
    };

    const screenPlayers = document.getElementById("screenPlayers");
    const screenRandomizer = document.getElementById("screenRandomizer");
    const resetFloating = document.getElementById("resetFloating");

    function showScreen(name){
      screenPlayers.classList.remove("active");
      screenRandomizer.classList.remove("active");

      if(name === "players"){
        screenPlayers.classList.add("active");
        resetFloating.style.display = "none";
      }
      if(name === "randomizer"){
        screenRandomizer.classList.add("active");
        resetFloating.style.display = "block";
      }
    }

    /***********************
     * RESULTS + BUTTONS
     ***********************/
    const resultsEl = document.getElementById("results");
    const btnRandomize = document.getElementById("btnRandomize");
    const btnReroll = document.getElementById("btnReroll");

    function syncButtons(){
      if(state.hasRolledOnce){
        btnRandomize.classList.add("hide");
        btnReroll.classList.add("show");
      } else {
        btnRandomize.classList.remove("hide");
        btnReroll.classList.remove("show");
      }
    }

    function renderResults(){
      resultsEl.innerHTML = "";
      if(state.assignments.length === 0){
        for(let i=0;i<state.players;i++){
          const line = document.createElement("div");
          line.className = "resultLine";
          line.textContent = "Board —: —";
          resultsEl.appendChild(line);
        }
      } else {
        for(const lineText of state.assignments){
          const line = document.createElement("div");
          line.className = "resultLine";
          line.textContent = lineText;
          resultsEl.appendChild(line);
        }
      }
      syncButtons();
    }

    function randomizeAssignments(){
      const n = state.players;

      if(BOARDS.length < n){
        alert(`Not enough boards (${BOARDS.length}) for ${n} players.`);
        return;
      }
      if(SPIRIT_BASES.length < n){
        alert(`Not enough distinct spirits (${SPIRIT_BASES.length}) for ${n} players.`);
        return;
      }

      const boardsPicked = shuffleCrypto(BOARDS).slice(0, n);
      const basesPicked  = shuffleCrypto(SPIRIT_BASES).slice(0, n);
      const spiritsPicked = basesPicked.map(base => pickRandomVariant(base));

      state.assignments = boardsPicked.map((b, i) => `${b}: ${spiritsPicked[i]}`);
      state.hasRolledOnce = true;

      saveStateToStorage();
      renderResults();
    }

    /***********************
     * RESET MODAL
     ***********************/
    const modalBackdrop = document.getElementById("modalBackdrop");
    const btnCancelReset = document.getElementById("btnCancelReset");
    const btnConfirmReset = document.getElementById("btnConfirmReset");

    function openResetModal(){
      modalBackdrop.classList.add("show");
      modalBackdrop.setAttribute("aria-hidden","false");
    }
    function closeResetModal(){
      modalBackdrop.classList.remove("show");
      modalBackdrop.setAttribute("aria-hidden","true");
    }
    function doResetToStart(){
      closeResetModal();

      state.players = parseInt(document.getElementById("playersSelect").value, 10) || 3;
      state.assignments = [];
      state.hasRolledOnce = false;

      clearStorage();
      history.replaceState(null, "", window.location.pathname);

      showScreen("players");
      renderResults();
    }

    btnCancelReset.addEventListener("click", closeResetModal);
    btnConfirmReset.addEventListener("click", doResetToStart);
    modalBackdrop.addEventListener("click", (e) => {
      if(e.target === modalBackdrop) closeResetModal();
    });

    /***********************
     * WIRE UI
     ***********************/
    const playersSelect = document.getElementById("playersSelect");

    playersSelect.addEventListener("change", () => {
      state.players = parseInt(playersSelect.value, 10);
      saveStateToStorage();
    });

    document.getElementById("btnContinue").addEventListener("click", () => {
      state.players = parseInt(playersSelect.value, 10) || 3;
      state.assignments = [];
      state.hasRolledOnce = false;
      saveStateToStorage();
      showScreen("randomizer");
      renderResults();
    });

    document.getElementById("btnBack").addEventListener("click", () => {
      history.replaceState(null, "", window.location.pathname);
      showScreen("players");
    });

    btnRandomize.addEventListener("click", randomizeAssignments);
    btnReroll.addEventListener("click", randomizeAssignments);

    // CONTINUAR -> adv_choose.html
    document.getElementById("btnContinue2").addEventListener("click", () => {
      saveStateToStorage();
      window.location.href = "./adv_choose.html";
    });

    document.getElementById("btnReset").addEventListener("click", openResetModal);

    /***********************
     * BOOT (#randomizer loads randomizer; restore state if exists)
     ***********************/
    function boot(){
      const saved = loadStateFromStorage();
      if(saved){
        if(typeof saved.players === "number") state.players = saved.players;
        if(Array.isArray(saved.assignments)) state.assignments = saved.assignments;
        if(typeof saved.hasRolledOnce === "boolean") state.hasRolledOnce = saved.hasRolledOnce;
        playersSelect.value = String(state.players);
      } else {
        state.players = parseInt(playersSelect.value, 10) || 3;
      }

      if(window.location.hash === "#randomizer"){
        showScreen("randomizer");
      } else {
        showScreen("players");
      }
      renderResults();
    }

    boot();
  </script>
</body>
</html>
