<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Adversario</title>

  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.7);
      --border:rgba(255,255,255,.22);
      --btn:rgba(255,255,255,.10);
      --btnHover:rgba(255,255,255,.16);
      --danger:rgba(255,80,80,.25);
    }

    html, body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      overscroll-behavior:none;
      -webkit-text-size-adjust:100%;
      font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      touch-action: manipulation;
      user-select:none;
    }

    #app{
      height:100vh;
      width:100vw;
      display:flex;
      flex-direction:column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing:border-box;
      position: relative;
    }

    /* Portrait blocker (igual que index) */
    #rotateOverlay{
      position:fixed;
      inset:0;
      background:#000;
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      z-index:50;
      box-sizing:border-box;
    }
    #rotateOverlay h1{ margin:0 0 8px 0; font-size:28px; letter-spacing:.5px; }
    #rotateOverlay p{ margin:0; color:var(--muted); font-size:18px; line-height:1.35; }
    @media (orientation: portrait){
      #rotateOverlay{ display:flex; }
    }

    .screen{
      flex:1;
      display:none;
      flex-direction:column;
      gap:18px;
      box-sizing:border-box;
    }
    .screen.active{ display:flex; }

    .center{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
      padding:18px;
      box-sizing:border-box;
    }

    h1{
      margin:0;
      font-size:34px;
      letter-spacing:.6px;
      text-align:center;
    }

    .controlsRow{
      display:flex;
      gap:14px;
      width:min(900px, 92vw);
      justify-content:center;
      align-items:center;
      flex-wrap:nowrap;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:var(--btn);
      color:var(--fg);
      padding:14px 18px;
      border-radius:14px;
      font-size:18px;
      letter-spacing:.3px;
      cursor:pointer;
      min-width:150px;
    }
    button:hover{ background:var(--btnHover); }
    button:active{ transform:translateY(1px); }
    button:disabled{
      opacity:.35;
      cursor:default;
    }

    button.small{
      min-width:auto;
      padding:10px 14px;
      font-size:16px;
      border-radius:12px;
    }
    button.danger{
      background:var(--danger);
      border-color: rgba(255,80,80,.45);
    }

    /* Reset floating button (igual que index) */
    #resetFloating{
      position:absolute;
      top:14px;
      right:14px;
      z-index:10;
      display:block;
    }

    /* Modal (igual que index) */
    #modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.6);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      box-sizing:border-box;
      z-index:40;
    }
    #modalBackdrop.show{ display:flex; }
    #modal{
      width:min(520px, 92vw);
      border:1px solid var(--border);
      border-radius:16px;
      background:#000;
      padding:18px;
      box-sizing:border-box;
    }
    #modal h2{ margin:0 0 12px 0; font-size:22px; letter-spacing:.2px; }
    #modal .modalRow{ display:flex; justify-content:flex-end; gap:10px; }

    /* Área central swipe */
    .swipeArea{
      width:min(900px, 92vw);
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      touch-action: pan-y;
    }

    /* Marco 3:2 sin recuadro */
    .imgBox{
      width:100%;
      aspect-ratio: 3 / 2;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      overflow:hidden;
      border:none;
      border-radius:0;
      box-shadow:none;
      position:relative;
    }

    img{
      width:100%;
      height:100%;
      object-fit: contain;
      display:none;
      border:none;
      outline:none;
      box-shadow:none;
      background:transparent;
      pointer-events:none;
    }

    /* Texto solo para SIN ADVERSARIO */
    .noAdvText{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--fg);
      font-size:22px;
      font-weight:800;
      letter-spacing:.2px;
    }
  </style>
</head>

<body>
  <div id="rotateOverlay">
    <div>
      <h1>Rotate iPad</h1>
      <p>Please use landscape mode.</p>
    </div>
  </div>

  <!-- Modal Reset -->
  <div id="modalBackdrop" aria-hidden="true">
    <div id="modal" role="dialog" aria-modal="true">
      <h2>Resetear?</h2>
      <div class="modalRow">
        <button id="btnCancelReset" class="small">CANCELAR</button>
        <button id="btnConfirmReset" class="small danger">RESETEAR</button>
      </div>
    </div>
  </div>

  <div id="app">
    <!-- Reset floating button -->
    <div id="resetFloating">
      <button id="btnReset" class="small danger">RESET</button>
    </div>

    <!-- SCREEN 1: ADVERSARIO -->
    <div id="screenAdv" class="screen active">
      <div class="center">
        <h1>ADVERSARIO</h1>

        <div class="swipeArea" id="swipeArea" aria-label="Swipe de adversarios">
          <div class="imgBox">
            <div class="noAdvText" id="noAdvTextAdv">SIN ADVERSARIO</div>
            <img id="imgAdv" alt="Adversario" />
          </div>
        </div>

        <div class="controlsRow">
          <button id="btnBack">BACK</button>
          <button id="btnRandom">RANDOM</button>
          <button id="btnContinue">CONTINUAR</button>
        </div>
      </div>
    </div>

    <!-- SCREEN 2: NIVEL -->
    <div id="screenLevel" class="screen">
      <div class="center">
        <h1>NIVEL</h1>

        <div class="swipeArea" aria-label="Nivel (placeholder)">
          <div class="imgBox">
            <div class="noAdvText" id="noAdvTextLevel">SIN ADVERSARIO</div>
            <img id="imgLevel" alt="Adversario" />
          </div>
        </div>

        <div class="controlsRow">
          <button id="btnBackFromLevel">BACK</button>
          <button disabled>RANDOM</button>
          <button disabled>CONTINUAR</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const INDEX_STORAGE_KEY = "si_helper_state_v1";
    const ADV_STORAGE_KEY   = "si_adv_state_v1";

    const IMG_BASE = "";

    // ORDEN exacto + SIN ADVERSARIO primero
    const ADVERSARIES = [
      { id:"none",           label:"Sin adversario",  png:"" },
      { id:"prussia",        label:"Prussia",         png:"Prussia.png" },
      { id:"suecia",         label:"Suecia",          png:"Suecia.png" },
      { id:"inglaterra",     label:"Inglaterra",      png:"Inglaterra.png" },
      { id:"francia",        label:"Francia",         png:"Francia.png" },
      { id:"escocia",        label:"Escocia",         png:"Escocia.png" },
      { id:"habsburg",       label:"Habsburg",        png:"Habsburg.png" },
      { id:"russia",         label:"Russia",          png:"Russia.png" },
      { id:"habsburg-minas", label:"Habsburg minas",  png:"Habsburg minas.png" }
    ];

    const $ = (s) => document.querySelector(s);

    function haptic(){
      try{ if(navigator.vibrate) navigator.vibrate(10); }catch(e){}
    }

    function cryptoInt(maxExclusive){
      if(!window.crypto || !crypto.getRandomValues) return Math.floor(Math.random() * maxExclusive);
      const arr = new Uint32Array(1);
      const limit = Math.floor(0xFFFFFFFF / maxExclusive) * maxExclusive;
      while(true){
        crypto.getRandomValues(arr);
        const x = arr[0];
        if(x < limit) return x % maxExclusive;
      }
    }

    function clampIndex(i){
      const n = ADVERSARIES.length;
      return ((i % n) + n) % n;
    }

    function appWasReset(){
      return !localStorage.getItem(INDEX_STORAGE_KEY);
    }

    function clearAdvState(){
      localStorage.removeItem(ADV_STORAGE_KEY);
      localStorage.removeItem("si_adversary_index");
      localStorage.removeItem("si_adversary_id");
      localStorage.removeItem("si_adversary_label");
      localStorage.removeItem("si_adversary_png");
      localStorage.removeItem("si_level");
    }

    function persistAdvState(){
      const payload = {
        index: state.index,
        screen: state.screen,
        level: state.level ?? null,
        updatedAt: Date.now()
      };
      localStorage.setItem(ADV_STORAGE_KEY, JSON.stringify(payload));
    }

    function loadAdvState(){
      if(appWasReset()){
        clearAdvState();
        return null;
      }
      try{
        const raw = localStorage.getItem(ADV_STORAGE_KEY);
        if(!raw) return null;
        const parsed = JSON.parse(raw);
        if(parsed && typeof parsed === "object") return parsed;
      }catch(e){
        return null;
      }
      return null;
    }

    function setAdvVisual(imgEl, noTextEl, png){
      const src = png ? (IMG_BASE + png) : "";
      if(!src){
        imgEl.style.display = "none";
        imgEl.src = "";
        noTextEl.style.display = "flex";
        return;
      }
      noTextEl.style.display = "none";
      imgEl.style.display = "block";
      imgEl.src = src;
    }

    function showScreen(which){
      const adv = $("#screenAdv");
      const lvl = $("#screenLevel");
      adv.classList.remove("active");
      lvl.classList.remove("active");
      if(which === "level") lvl.classList.add("active");
      else adv.classList.add("active");
      state.screen = which;
      persistAdvState();
    }

    function render(){
      const adv = ADVERSARIES[state.index];
      setAdvVisual($("#imgAdv"),   $("#noAdvTextAdv"),   adv.png);
      setAdvVisual($("#imgLevel"), $("#noAdvTextLevel"), adv.png);
      persistAdvState();
    }

    function go(delta){
      state.index = clampIndex(state.index + delta);
      render();
    }

    // ✅ CAMBIO CLAVE: random NO elige "Sin adversario"
    function randomPick(){
      const n = ADVERSARIES.length;
      if(n <= 1) return;

      // índices válidos: 1..n-1 (excluye 0 = none)
      const min = 1;
      const range = n - 1; // cantidad de opciones reales

      let r = min + cryptoInt(range);

      // evita repetición inmediata (dentro del rango válido)
      if(range > 1 && r === state.index){
        r = min + ((r - min + 1) % range);
      }

      state.index = r;
      render();
    }

    const state = {
      index: 0,        // ✅ default: Sin adversario al entrar
      screen: "adv",
      level: null,
      dragging: false,
      startX: 0,
      lastX: 0
    };

    (function boot(){
      const saved = loadAdvState();
      if(saved){
        if(typeof saved.index === "number") state.index = clampIndex(saved.index);
        if(saved.screen === "level") state.screen = "level";
      }else{
        state.index = 0;      // Sin adversario al entrar
        state.screen = "adv";
      }
      render();
      showScreen(state.screen);
    })();

    // Swipe infinito (solo en pantalla adversario)
    const swipeArea = $("#swipeArea");

    swipeArea.addEventListener("pointerdown", (e) => {
      state.dragging = true;
      state.startX = e.clientX;
      state.lastX = e.clientX;
      swipeArea.setPointerCapture(e.pointerId);
    });

    swipeArea.addEventListener("pointermove", (e) => {
      if(!state.dragging) return;
      state.lastX = e.clientX;
    });

    function endSwipe(){
      if(!state.dragging) return;
      state.dragging = false;

      const dx = state.lastX - state.startX;
      const TH = 50;
      if(Math.abs(dx) >= TH){
        haptic();
        if(dx < 0) go(+1);
        else go(-1);
      }
    }

    swipeArea.addEventListener("pointerup", endSwipe);
    swipeArea.addEventListener("pointercancel", endSwipe);
    swipeArea.addEventListener("pointerleave", endSwipe);

    // Botones
    $("#btnBack").addEventListener("click", () => {
      haptic();
      window.location.href = "index.html#randomizer";
    });

    $("#btnRandom").addEventListener("click", () => {
      haptic();
      randomPick();
    });

    $("#btnContinue").addEventListener("click", () => {
      haptic();
      showScreen("level");
    });

    $("#btnBackFromLevel").addEventListener("click", () => {
      haptic();
      showScreen("adv");
    });

    // Error de imagen -> muestra texto "SIN ADVERSARIO"
    $("#imgAdv").addEventListener("error", () => {
      $("#imgAdv").style.display = "none";
      $("#noAdvTextAdv").style.display = "flex";
    });
    $("#imgLevel").addEventListener("error", () => {
      $("#imgLevel").style.display = "none";
      $("#noAdvTextLevel").style.display = "flex";
    });

    // Reset modal (igual que index)
    const modalBackdrop = $("#modalBackdrop");
    const btnCancelReset = $("#btnCancelReset");
    const btnConfirmReset = $("#btnConfirmReset");

    function openResetModal(){
      modalBackdrop.classList.add("show");
      modalBackdrop.setAttribute("aria-hidden","false");
    }
    function closeResetModal(){
      modalBackdrop.classList.remove("show");
      modalBackdrop.setAttribute("aria-hidden","true");
    }

    function doResetToStart(){
      closeResetModal();
      localStorage.removeItem(INDEX_STORAGE_KEY);
      clearAdvState();
      window.location.href = "index.html";
    }

    $("#btnReset").addEventListener("click", openResetModal);
    btnCancelReset.addEventListener("click", closeResetModal);
    btnConfirmReset.addEventListener("click", doResetToStart);
    modalBackdrop.addEventListener("click", (e) => {
      if(e.target === modalBackdrop) closeResetModal();
    });
  </script>
</body>
</
