<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Adversario</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:#9aa0a6;
      --btn:#161616;
      --btn2:#232323;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow:hidden;
    }

    .wrap{
      height:100vh;
      padding:16px 18px calc(16px + env(safe-area-inset-bottom));
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .title{
      text-align:center;
      font-size:22px;
      font-weight:1000;
      letter-spacing:.6px;
      margin-top:2px;
    }

    .stage{
      flex:1;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      user-select:none;
      touch-action: pan-y; /* para que el swipe horizontal funcione bien */
    }

    /* Marco 3:2 (equivalente 1800x1200) SIN BORDE */
    .imgBox{
      width:min(92vw, 1100px);
      max-height:72vh;
      aspect-ratio: 3 / 2;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      overflow:hidden;
    }

    img{
      width:100%;
      height:100%;
      object-fit: contain;
      display:none;
      border:none;
      outline:none;
      box-shadow:none;
      background:transparent;
      pointer-events:none;
    }

    .noImg{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-weight:900;
      font-size:14px;
      letter-spacing:.2px;
    }

    .name{
      text-align:center;
      font-weight:950;
      font-size:18px;
      margin-top:6px;
      min-height:24px;
    }

    .bottom{
      display:flex;
      gap:10px;
      justify-content:space-between;
      align-items:center;
    }

    button{
      flex:1;
      border:0;
      color:var(--fg);
      background:var(--btn);
      padding:14px 10px;
      border-radius:16px;
      font-weight:900;
      font-size:15px;
      letter-spacing:.3px;
      cursor:pointer;
    }
    button:active{ transform:scale(0.98); background:var(--btn2); }

    .screen{ display:none; height:100%; }
    .screen.active{ display:flex; flex-direction:column; height:100%; }

    .subtitle{
      text-align:center;
      font-size:22px;
      font-weight:1000;
      letter-spacing:.6px;
      margin-top:2px;
    }

    @media (min-width: 900px){
      .title,.subtitle{ font-size:26px; }
      .name{ font-size:20px; }
      button{ font-size:16px; padding:16px 10px; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- SCREEN 1: ADVERSARIO -->
    <div class="screen active" id="screenAdv">
      <div class="title">ADVERSARIO</div>

      <div class="stage" id="swipeArea" aria-label="Swipe de adversarios">
        <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
          <div class="imgBox">
            <div class="noImg" id="noImgAdv">Sin imagen</div>
            <img id="imgAdv" alt="Adversario" />
          </div>
          <div class="name" id="nameAdv">Sin adversario</div>
        </div>
      </div>

      <div class="bottom">
        <button id="btnBack">BACK</button>
        <button id="btnRandom">RANDOM</button>
        <button id="btnContinue">CONTINUAR</button>
      </div>
    </div>

    <!-- SCREEN 2: NIVEL (por ahora solo título + foto) -->
    <div class="screen" id="screenLevel">
      <div class="subtitle">NIVEL</div>

      <div class="stage">
        <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
          <div class="imgBox">
            <div class="noImg" id="noImgLevel">Sin imagen</div>
            <img id="imgLevel" alt="Adversario" />
          </div>
          <div class="name" id="nameLevel">Sin adversario</div>
        </div>
      </div>

      <div class="bottom">
        <button id="btnBackFromLevel">BACK</button>
        <button id="btnRandomDisabled" disabled style="opacity:.35;">RANDOM</button>
        <button id="btnContinueDisabled" disabled style="opacity:.35;">CONTINUAR</button>
      </div>
    </div>

  </div>

  <script>
    /***********************
     * Persistencia
     ***********************/
    const LS_KEYS = {
      adversaryIndex: "si_adversary_index",
      adversaryId:    "si_adversary_id",
      adversaryLabel: "si_adversary_label",
      adversaryPng:   "si_adversary_png",
      level:          "si_level"
    };

    /***********************
     * PNG exactos + ORDEN exacto pedido
     ***********************/
    const IMG_BASE = ""; // si están en carpeta: "img/"

    const ADVERSARIES = [
      { id:"none",           label:"Sin adversario",  png:"" },
      { id:"prussia",        label:"Prussia",         png:"Prussia.png" },
      { id:"suecia",         label:"Suecia",          png:"Suecia.png" },
      { id:"inglaterra",     label:"Inglaterra",      png:"Inglaterra.png" },
      { id:"francia",        label:"Francia",         png:"Francia.png" },
      { id:"escocia",        label:"Escocia",         png:"Escocia.png" },
      { id:"habsburg",       label:"Habsburg",        png:"Habsburg.png" },
      { id:"russia",         label:"Russia",          png:"Russia.png" },
      { id:"habsburg-minas", label:"Habsburg minas",  png:"Habsburg minas.png" }
    ];

    /***********************
     * Helpers
     ***********************/
    const $ = (s) => document.querySelector(s);

    function haptic(){
      try{ if(navigator.vibrate) navigator.vibrate(10); }catch(e){}
    }

    function clampIndex(i){
      const n = ADVERSARIES.length;
      return ((i % n) + n) % n; // infinito
    }

    function persistCurrent(){
      const adv = ADVERSARIES[state.index];
      localStorage.setItem(LS_KEYS.adversaryIndex, String(state.index));
      localStorage.setItem(LS_KEYS.adversaryId, adv.id);
      localStorage.setItem(LS_KEYS.adversaryLabel, adv.label);
      localStorage.setItem(LS_KEYS.adversaryPng, adv.png);
      // level queda para después
    }

    function setImage(imgEl, noEl, png){
      const src = png ? (IMG_BASE + png) : "";
      if(!src){
        imgEl.style.display = "none";
        imgEl.src = "";
        noEl.style.display = "flex";
        return;
      }
      noEl.style.display = "none";
      imgEl.style.display = "block";
      imgEl.src = src;
    }

    function render(){
      const adv = ADVERSARIES[state.index];

      $("#nameAdv").textContent = adv.label;
      setImage($("#imgAdv"), $("#noImgAdv"), adv.png);

      $("#nameLevel").textContent = adv.label;
      setImage($("#imgLevel"), $("#noImgLevel"), adv.png);

      persistCurrent();
    }

    function go(delta){
      state.index = clampIndex(state.index + delta);
      render();
    }

    function showScreen(which){
      const adv = $("#screenAdv");
      const lvl = $("#screenLevel");
      if(which === "level"){
        adv.classList.remove("active");
        lvl.classList.add("active");
      }else{
        lvl.classList.remove("active");
        adv.classList.add("active");
      }
    }

    function randomPick(){
      const n = ADVERSARIES.length;
      let r = Math.floor(Math.random() * n);
      if(n > 1 && r === state.index) r = (r + 1) % n; // evita repetición inmediata
      state.index = r;
      render();
    }

    /***********************
     * Estado + restore
     ***********************/
    const state = {
      index: 0,
      dragging: false,
      startX: 0,
      lastX: 0
    };

    (function init(){
      const saved = localStorage.getItem(LS_KEYS.adversaryIndex);
      if(saved !== null && !Number.isNaN(Number(saved))){
        state.index = clampIndex(Number(saved));
      }else{
        state.index = 0; // arranca en Sin adversario
      }
      render();
    })();

    /***********************
     * Swipe infinito
     ***********************/
    const swipeArea = $("#swipeArea");

    swipeArea.addEventListener("pointerdown", (e) => {
      state.dragging = true;
      state.startX = e.clientX;
      state.lastX = e.clientX;
      swipeArea.setPointerCapture(e.pointerId);
    });

    swipeArea.addEventListener("pointermove", (e) => {
      if(!state.dragging) return;
      state.lastX = e.clientX;
    });

    function endSwipe(){
      if(!state.dragging) return;
      state.dragging = false;

      const dx = state.lastX - state.startX;
      const TH = 50;

      if(Math.abs(dx) >= TH){
        haptic();
        if(dx < 0) go(+1);  // izquierda => siguiente
        else go(-1);        // derecha => anterior
      }
    }

    swipeArea.addEventListener("pointerup", endSwipe);
    swipeArea.addEventListener("pointercancel", endSwipe);
    swipeArea.addEventListener("pointerleave", endSwipe);

    /***********************
     * Botones
     ***********************/
    $("#btnBack").addEventListener("click", () => {
      haptic();
      // BACK -> randomizer de spirit boards
      window.location.href = "index.html";
    });

    $("#btnRandom").addEventListener("click", () => {
      haptic();
      randomPick();
    });

    $("#btnContinue").addEventListener("click", () => {
      haptic();
      persistCurrent();
      showScreen("level");
    });

    $("#btnBackFromLevel").addEventListener("click", () => {
      haptic();
      showScreen("adv");
    });

    // Si falta PNG, no rompe
    $("#imgAdv").addEventListener("error", () => {
      $("#imgAdv").style.display = "none";
      $("#noImgAdv").style.display = "flex";
    });
    $("#imgLevel").addEventListener("error", () => {
      $("#imgLevel").style.display = "none";
      $("#noImgLevel").style.display = "flex";
    });
  </script>
</body>
</html>
